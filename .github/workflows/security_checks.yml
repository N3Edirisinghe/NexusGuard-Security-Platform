name: Security Middleware CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx fastapi uvicorn redis pydantic-settings sqlalchemy passlib[argon2] python-jose[cryptography]
        
    - name: Run WAF Unit Tests
      run: |
        pytest tests/test_waf.py
